name: Release Gems
description: Build and publish Ruby gems (build stage)
inputs:
  github-token:
    description: GitHub token for uploading artifacts and creating attestations
    required: false
    default: ${{ github.token }}
  retention-days:
    description: Artifact retention period in days. Defaults to the account-level GitHub Actions default.
    required: false
  ruby:
    description: Path or name of the Ruby binary used to invoke the gem-building script
    required: false
    default: ruby
  sbom:
    description: Path to an SBOM file to attach. If omitted, no SBOM attestation is created.
    required: false
  sbom-predicate-type:
    description: in-toto predicate type URI for the SBOM attestation. If omitted, auto-detected from the SBOM file content.
    required: false
  verify-tag:
    description: If true, requires the triggering tag to be an annotated tag with a valid signature.
    required: false
    default: "true"
  sandbox:
    description: >-
      If set to 'bubblewrap', gem builds and hooks run inside a bubblewrap sandbox.
      Prevents subprocesses from accessing secrets via /proc or privilege escalation.
      Requires bubblewrap to be installed on the runner.
    required: false
    default: 'false'
  sandbox-isolate-network:
    description: >-
      When sandboxing is enabled, if true, the network namespace is unshared,
      blocking all network access inside the sandbox.
    required: false
    default: 'true'
  sandbox-writable-paths:
    description: >-
      When sandboxing is enabled, a newline-separated list of absolute paths to
      mount as writable inside the sandbox. Blank lines are ignored.
    required: false
    default: ''
  install-bubblewrap:
    description: >-
      If true, installs bubblewrap and configures AppArmor before building.
      Defaults to true when sandbox is bubblewrap.
    required: false
runs:
  using: node24
  main: ../dist/build.js
